name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install numpy pandas scikit-learn scipy plotly streamlit joblib pytest
      - name: Generate data
        run: python data/generate.py
      - name: Engineer features
        run: python features/engineer.py
      - name: Train models
        run: python models/train.py
      - name: Run stats
        run: python analysis/stats.py
      - name: Run tests
        run: pytest tests/ -v
```

